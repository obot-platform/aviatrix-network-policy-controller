name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true

      - name: Generate
        run: go generate ./...

      - name: Verify generated files
        run: git diff --exit-code

      - name: Build
        run: make build

      - name: Test
        run: make test

      - name: Lint
        run: make lint
