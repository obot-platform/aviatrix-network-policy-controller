name: Helm Chart

on:
  push:
    branches:
      - main
    paths:
      - chart/**
  pull_request:
    branches:
      - main
    paths:
      - chart/**

permissions:
  contents: read

jobs:
  lint:
    runs-on: depot-ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint Helm chart
        run: helm lint chart
