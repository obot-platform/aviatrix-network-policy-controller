apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "aviatrix-network-policy-controller.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "aviatrix-network-policy-controller.name" . }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "aviatrix-network-policy-controller.name" . }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "aviatrix-network-policy-controller.name" . }}
    spec:
      serviceAccountName: {{ include "aviatrix-network-policy-controller.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: controller
          image: "{{ .Values.image.repository }}:{{ include "aviatrix-network-policy-controller.imageTag" . }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: OBOT_STORAGE_URL
              value: {{ .Values.obotStorageURL | quote }}
            - name: OBOT_STORAGE_TOKEN_FILE
              value: {{ .Values.obotStorageTokenFile | quote }}
            - name: MCP_RUNTIME_NAMESPACE
              value: {{ .Values.mcpRuntimeNamespace | quote }}
          ports:
            - name: healthz
              containerPort: 8081
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: healthz
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: healthz
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: provider-token
              mountPath: /var/run/secrets/obot-network-policy-provider
              readOnly: true
      volumes:
        - name: provider-token
          secret:
            secretName: {{ .Values.secretName }}
